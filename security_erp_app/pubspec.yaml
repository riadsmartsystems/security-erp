name: security_erp
description: Security ERP Platform - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  geolocator: ^11.0.0
  image_picker: ^1.0.7
  permission_handler: ^11.1.0
  flutter_launcher_icons: ^0.14.4
  url_launcher: ^6.2.5
  mobile_scanner: ^5.1.0
  sqflite: ^2.3.0
  path: ^1.9.0
  connectivity_plus: ^6.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.jpg"
  adaptive_icon_background: "#1E40AF"
  adaptive_icon_foreground: "assets/icon.jpg"
  remove_alpha_ios: true
