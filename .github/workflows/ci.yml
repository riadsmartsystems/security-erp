name: Security ERP CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lint dependencies
        run: |
          pip install flake8 black isort

      - name: Lint Python code
        run: |
          flake8 services/ --max-line-length=120 --ignore=E501,W503

      - name: Check code formatting
        run: |
          black --check services/

      - name: Verify Python syntax (security-api)
        run: |
          python -m py_compile services/security-api/app/main.py
          python -m py_compile services/security-api/app/routes/doctypes.py
          python -m py_compile services/security-api/app/routes/visits.py
          python -m py_compile services/security-api/app/core/database.py
          python -m py_compile services/security-api/app/core/config.py
          python -m py_compile services/security-api/app/services/ai_orchestrator_service.py
          python -m py_compile services/security-api/app/services/estimate_service.py
          python -m py_compile services/security-api/app/routes/ai.py
          python -m py_compile services/security-api/app/routes/estimates.py
          python -m py_compile services/security-api/app/routes/media.py
          python -m py_compile services/security-api/app/routes/scenarios.py
          python -m py_compile services/security-api/app/routes/ai_admin.py
          python -m py_compile services/security-api/app/schemas/ai.py
          python -m py_compile services/security-api/app/schemas/estimate.py
          python -m py_compile services/security-api/app/schemas/media.py
          python -m py_compile services/security-api/app/schemas/scenario.py
          python -m py_compile services/security-api/app/schemas/ai_admin.py
          python -m py_compile services/security-api/app/schemas/sync.py
          python -m py_compile services/security-api/app/services/sync_service.py
          python -m py_compile services/security-api/app/routes/sync.py

      - name: Lint and syntax check security_erp app
        run: |
          python -c "
          import ast, sys, pathlib
          errors = []
          for f in pathlib.Path('erpnext/security_erp').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              [print(e) for e in errors]
              sys.exit(1)
          print(f'Syntax OK: {len(list(pathlib.Path(\"erpnext/security_erp\").rglob(\"*.py\")))} files checked')
          "

      - name: A1 AI-Vault isolation lint
        run: |
          python tests/ai_isolation/check_ai_isolation.py

      - name: V2 Vault isolation lint
        run: |
          python tests/vault_isolation/check_vault_isolation.py

      - name: Install test dependencies
        run: |
          pip install -r requirements-test.txt

      - name: Run unit tests
        run: |
          python tests/security-api/test_models.py

      - name: Verify R3/R4 syntax (auth + rate limit files)
        run: |
          python -m py_compile services/security-api/app/auth/jwt.py
          python -m py_compile services/security-api/app/schemas/auth.py
          python -m py_compile services/security-api/app/routes/auth.py
          python -m py_compile services/security-api/app/core/rate_limit.py

      - name: R3 CI gate — jti+did present in refresh token
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, 'services/security-api')
          os.environ.setdefault('SECRET_KEY', 'ci-test-secret-key-min-32-chars-ok')
          os.environ.setdefault('FRAPPE_URL', 'http://localhost:8000')
          os.environ.setdefault('REDIS_URL', 'redis://localhost:6379')
          from app.auth.jwt import create_refresh_token, decode_token
          token = create_refresh_token('ci-user@test.com', 'ci-device-id')
          payload = decode_token(token)
          assert 'jti' in payload, f'jti missing from refresh token: {payload}'
          assert 'did' in payload, f'did missing from refresh token: {payload}'
          assert payload['did'] == 'ci-device-id', f'did mismatch: {payload}'
          print(f'R3 gate: jti={payload[\"jti\"][:8]}... did={payload[\"did\"]} OK')
          "

      - name: R4 CI gate — check_rate_limit wired on login and refresh
        run: |
          python -c "
          content = open('services/security-api/app/routes/auth.py').read()
          assert 'check_rate_limit' in content, 'check_rate_limit not imported in auth.py'
          assert 'rl:login:' in content, 'login rate-limit key missing in auth.py'
          assert 'rl:refresh:' in content, 'refresh rate-limit key missing in auth.py'
          assert 'rate_limit_login_max' in content, 'rate_limit_login_max not referenced'
          assert 'rate_limit_refresh_max' in content, 'rate_limit_refresh_max not referenced'
          print('R4 gate: check_rate_limit on login + refresh OK')
          "

      - name: Run R3 refresh rotation tests
        run: |
          python -m unittest tests.r3.test_r3_refresh_rotation -v
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok
          FRAPPE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379

      - name: Run FIX-5 rate limit + Ukrainian roles tests
        run: |
          python -m unittest tests.fix5.test_fix5_rate_limit -v
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok
          FRAPPE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379

      - name: V2 Vault crypto tests
        run: |
          python -m pytest tests/vault/test_v2_vault_crypto.py -v
        env:
          PYTHONPATH: erpnext/security_erp
          VAULT_MASTER_KEY: "a0a1a2a3a4a5a6a7a8a9aaabacadaeafb0b1b2b3b4b5b6b7b8b9babbbcbdbebf"

      - name: Run A2 AI service tests
        run: |
          python -m unittest tests.ai.test_a2_ai_service -v
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp

      - name: Run A3 Whisper + RQ task tests
        run: |
          python -m unittest tests.a3.test_a3_tasks -v
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp

      - name: Verify A3 syntax (new files)
        run: |
          python -m py_compile services/whisper/main.py
          python -m py_compile erpnext/security_erp/security_erp/tasks/transcribe.py
          python -m py_compile erpnext/security_erp/security_erp/tasks/ai_estimate.py

      - name: Run A4 estimate lifecycle + no-code admin + degradation tests
        run: |
          python -m unittest tests.a4.test_a4_session -v
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp

      - name: Verify S1 syntax (sync files)
        run: |
          python -m py_compile services/security-api/app/schemas/sync.py
          python -m py_compile services/security-api/app/services/sync_service.py
          python -m py_compile services/security-api/app/routes/sync.py

      - name: Run S1 sync backend tests
        run: |
          python -m unittest tests.s1.test_s1_sync -v
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp

      - name: Verify S4 syntax (new files)
        run: |
          python -m py_compile services/security-api/app/schemas/serial.py
          python -m py_compile services/security-api/app/schemas/maps_warehouse.py
          python -m py_compile services/security-api/app/routes/serial.py
          python -m py_compile services/security-api/app/routes/maps.py
          python -m py_compile services/security-api/app/routes/warehouse.py
          python -m py_compile erpnext/security_erp/security_erp/serial_scan.py
          python -m py_compile erpnext/security_erp/security_erp/tasks/process_serial_scans.py

      - name: Run S4 gateway + map + warehouse tests
        run: |
          python -m unittest tests.s4.test_s4_gateway -v
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp

      - name: Verify FIX-6 syntax (visit + warehouse service layer)
        run: |
          python -m py_compile services/security-api/app/services/visit_service.py
          python -m py_compile services/security-api/app/services/warehouse_service.py

      - name: Run FIX-6 gateway discipline tests
        run: |
          python -m unittest tests.fix6.test_fix6_gateway_discipline -v
        env:
          PYTHONPATH: services/security-api

      - name: FIX-6 CI gate — gateway discipline (regression guard)
        run: python scripts/check_gateway_discipline.py

      - name: FIX-6 CI gate — check_gateway_discipline unit tests
        run: |
          python -m unittest tests.fix6.test_check_gateway_discipline -v
        env:
          PYTHONPATH: services/security-api

      - name: Verify C1 syntax (calculator files)
        run: |
          python -m py_compile services/security-api/app/routes/calculator.py
          python -m py_compile services/security-api/app/services/calculator_service.py
          python -m py_compile services/security-api/app/schemas/calculator.py
          python -m py_compile erpnext/security_erp/security_erp/calculator.py

      - name: "C1 CI gate — check rl:calc: in calculator route"
        run: |
          python -c "
          content = open('services/security-api/app/routes/calculator.py').read()
          assert 'rl:calc:' in content, 'rl:calc: rate-limit key missing in calculator.py'
          assert 'check_rate_limit' in content, 'check_rate_limit not used in calculator.py'
          assert 'verify_turnstile' in content, 'verify_turnstile not used in calculator.py'
          print('C1 gate: rl:calc: + verify_turnstile OK')
          "

      - name: Run C1 calculator backend tests
        run: |
          python -m pytest tests/c1/ -v
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok
          FRAPPE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379

      - name: Verify P1 syntax (push files)
        run: |
          python -m py_compile services/security-api/app/services/push_service.py
          python -m py_compile services/security-api/app/routes/push.py
          python -m py_compile services/security-api/app/schemas/push.py

      - name: P1 CI gate — push endpoints registered
        run: |
          python -c "
          content = open('services/security-api/app/routes/push.py').read()
          assert '/api/v2/push' in content, '/api/v2/push prefix missing'
          assert 'push_token_register' in content, 'push_token_register endpoint missing'
          assert 'push_token_revoke' in content, 'push_token_revoke endpoint missing'
          assert 'push_send_test' in content, 'push_send_test endpoint missing'
          print('P1 gate: push endpoints OK')
          "

      - name: P1 CI gate — fire_and_forget triggers in sync/estimates/media
        run: |
          python -c "
          for route, marker in [('sync.py', 'sync_conflict_resolved'), ('estimates.py', 'estimate_review'), ('media.py', 'transcription_ready')]:
              content = open(f'services/security-api/app/routes/{route}').read()
              assert 'fire_and_forget_push' in content, f'fire_and_forget_push missing in {route}'
              assert marker in content, f'{marker} data type missing in {route}'
          print('P1 gate: fire_and_forget triggers OK')
          "

      - name: P1 CI gate — FCM API (send_each_for_multicast + UnregisteredError)
        run: |
          python -c "
          content = open('services/security-api/app/services/push_service.py').read()
          assert 'send_each_for_multicast' in content, 'send_each_for_multicast missing'
          assert 'UnregisteredError' in content, 'UnregisteredError revocation missing'
          assert '500' in content, '500-token chunking missing'
          assert 'fire_and_forget_push' in content, 'fire_and_forget_push missing'
          print('P1 gate: FCM API OK')
          "

      - name: P1 CI gate — auth check on push routes
        run: |
          python -c "
          content = open('services/security-api/app/routes/push.py').read()
          assert 'get_current_user' in content, 'get_current_user dependency missing'
          assert 'CurrentUser' in content, 'CurrentUser type missing'
          assert 'System Manager' in content, 'admin role check missing'
          print('P1 gate: auth on push routes OK')
          "

      - name: Run P1 push notification tests
        run: |
          python -m unittest discover -s tests/p1 -v
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok
          FRAPPE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379

      - name: Run E5 integration tests
        run: |
          python3 -m pytest tests/e5/ -v --tb=short
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok
          FRAPPE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379

      - name: Run S1 sync integration tests
        run: |
          python3 -m pytest tests/s1/test_s1_sync_integration.py -v --tb=short
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok
          FRAPPE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379

      - name: Run FIX-4 AI bugs regression tests
        run: |
          python3 -m pytest tests/fix4/ -v --tb=short
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok
          FRAPPE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379

      - name: Run R6 estimate schema tests
        run: |
          python3 -m pytest tests/r6/ -v --tb=short
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok
          FRAPPE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379

      - name: Run Vault Act tests
        run: |
          python3 -m pytest tests/vault/test_act_pure.py -v --tb=short
        env:
          PYTHONPATH: erpnext/security_erp
          VAULT_MASTER_KEY: "a0a1a2a3a4a5a6a7a8a9aaabacadaeafb0b1b2b3b4b5b6b7b8b9babbbcbdbebf"

      - name: Run Push service tests
        run: |
          python3 -m pytest tests/p1/test_push_service.py -v --tb=short
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok
          FRAPPE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379

      - name: Run E9 security hardening tests
        run: |
          python3 -m pytest tests/e9/ -v --tb=short
        env:
          PYTHONPATH: services/security-api:erpnext/security_erp
          SECRET_KEY: ci-test-secret-key-min-32-chars-ok
          FRAPPE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379
          VAULT_MASTER_KEY: "a0a1a2a3a4a5a6a7a8a9aaabacadaeafb0b1b2b3b4b5b6b7b8b9babbbcbdbebf"

      - name: Verify C2 TypeScript (Next.js)
        working-directory: riad_web
        run: npx tsc --noEmit

      - name: Run C2 Next.js tests
        working-directory: riad_web
        run: npm test

      - name: Build C2 Next.js site
        working-directory: riad_web
        run: npm run build

      - name: FIX-7 CI gate — durability configs present
        run: |
          python -c "
          mariadb = open('configs/mariadb.cnf').read()
          redis = open('configs/redis.conf').read()
          assert 'log_bin' in mariadb, 'log_bin missing'
          assert 'binlog_format' in mariadb, 'binlog_format missing'
          assert 'ROW' in mariadb, 'binlog_format != ROW'
          assert 'appendonly' in redis, 'appendonly missing'
          assert 'appendfsync' in redis, 'appendfsync missing'
          print('FIX-7 gate: OK')
          "

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Run S2 Flutter database tests
        run: |
          cd riad_mobile
          flutter pub get
          flutter test test/s2/database_test.dart

      - name: Run S2 Flutter sync client tests
        run: |
          cd riad_mobile
          flutter pub get
          flutter test test/s2/sync_client_test.dart

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t security-api -f services/security-api/Dockerfile services/security-api/
          docker build -t erpnext-backend -f Dockerfile.backend .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Build successful! Deploy manually with:"
          echo "docker compose pull && docker compose up -d"
