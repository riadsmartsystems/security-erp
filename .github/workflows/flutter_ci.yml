name: Flutter CI

on:
  push:
    branches: [master, develop]
    paths:
      - 'riad_mobile/**'
      - '.github/workflows/flutter_ci.yml'
  pull_request:
    paths:
      - 'riad_mobile/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: riad_mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Drift + Riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Unit + Widget tests
        run: flutter test --coverage

      - name: Security check — ai_allowed never true in production code
        run: |
          count=$(grep -rn "ai_allowed.*true\|aiAllowed.*true" lib/ | grep -v "//" | wc -l)
          echo "ai_allowed=true occurrences: $count"
          [ "$count" -eq 0 ] || (echo "FAIL: ai_allowed=true found in production code!" && exit 1)

      - name: Security check — Vault entries not in Drift tables
        run: |
          count=$(grep -rn "vaultEntries\|vault_entries\|VaultEntry" lib/core/db/ | wc -l)
          echo "Vault in Drift occurrences: $count"
          [ "$count" -eq 0 ] || (echo "FAIL: Vault entries in Drift!" && exit 1)

      - name: Security check — push payload has no secrets
        run: |
          python3 -c "
          content = open('lib/core/push/push_notification_service.dart').read()
          assert 'password' not in content.lower() or 'fcm_token' in content, 'OK: only fcm_token'
          forbidden = ['vault', 'secret', 'password', 'master_key']
          payload_section = content[content.find('_payloadFrom'):content.find('_payloadFrom') + 200]
          for word in ['password', 'secret', 'master_key']:
              assert word not in payload_section.lower(), f'FAIL: {word} found in payload!'
          print('Push payload security check OK')
          "

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://api.riad.fun/api/v2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: riad-release-apk-${{ github.sha }}
          path: riad_mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
