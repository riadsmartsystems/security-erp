name: riad_mobile
description: RIAD Smart System - Offline-first Flutter mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.8.0
  http: ^1.1.0
  uuid: ^4.2.0
  flutter_secure_storage: ^9.0.0
  mobile_scanner: ^5.0.0
  camera: ^0.11.0
  record: ^5.1.0
  permission_handler: ^11.0.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.14.0
  build_runner: ^2.4.0
  mockito: ^5.4.0
  http_mockery: ^0.6.0

flutter:
  uses-material-design: true
