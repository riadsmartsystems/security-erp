global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]

  - job_name: "security-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["security-api:8000"]

  - job_name: "fsm-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["fsm-service:8001"]

  - job_name: "cmdb-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["cmdb-service:8002"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
