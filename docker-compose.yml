x-erpnext-common: &erpnext-common
  image: frappe/erpnext:v15.111.0
  restart: unless-stopped
  volumes:
    - ./erpnext/security_erp:/home/frappe/frappe-bench/apps/security_erp
    - erpnext_sites:/home/frappe/frappe-bench/sites
  environment:
    - FRAPPE_SITE_NAME_HEADER=${SITE_NAME}

services:

  # ── Дані ─────────────────────────────────────────────

  mariadb:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./configs/mariadb.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── ERPNext ──────────────────────────────────────────

  erpnext-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    volumes:
      - ./erpnext/security_erp:/home/frappe/frappe-bench/apps/security_erp
      - erpnext_sites:/home/frappe/frappe-bench/sites
    environment:
      - FRAPPE_SITE_NAME_HEADER=${SITE_NAME}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/method/ping || exit 1"]
      start_period: 120s
      interval: 15s
      timeout: 5s
      retries: 10

  erpnext-frontend:
    <<: *erpnext-common
    command: nginx-entrypoint.sh
    depends_on:
      erpnext-backend:
        condition: service_healthy
    ports:
      - "8080:8080"

  erpnext-worker-default:
    <<: *erpnext-common
    command: bench worker --queue default
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-worker-short:
    <<: *erpnext-common
    command: bench worker --queue short
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-scheduler:
    <<: *erpnext-common
    command: bench schedule
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-socketio:
    <<: *erpnext-common
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js
    depends_on:
      erpnext-backend:
        condition: service_healthy

  # ── Proxy ────────────────────────────────────────────

  traefik:
    image: traefik:v2.10
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/traefik:/etc/traefik/dynamic:ro

  # ── Cloudflare Tunnel ────────────────────────────────

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./configs/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./configs/cloudflared/creds.json:/etc/cloudflared/creds.json:ro

volumes:
  mariadb_data:
  redis_data:
  erpnext_sites:
