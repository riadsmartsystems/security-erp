# =============================================================================
# Security ERP Platform - Docker Compose (Phase 1 MVP)
# =============================================================================
# Services: ERPNext, MariaDB, PostgreSQL, Redis, MinIO, NATS, n8n,
#           Traefik, Prometheus, Grafana, Loki, Security API, FSM, CMDB,
#           Telegram Service
# =============================================================================

networks:
  erpnet:
    driver: bridge
  dbnet:
    driver: bridge
    internal: true

volumes:
  mariadb_data:
  postgres_data:
  redis_data:
  minio_data:
  erpnext_sites:
  erpnext_assets:
  erpnext_logs:
  prometheus_data:
  grafana_data:
  loki_data:
  n8n_data:
  nats_data:

services:
  # =========================================================================
  # REVERSE PROXY
  # =========================================================================
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=security-erp_erpnet"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=WARN"
      - "--accesslog=false"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - erpnet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=basic-auth"

  # =========================================================================
  # DATABASES
  # =========================================================================
  mariadb:
    image: mariadb:10.6
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./configs/mariadb.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - erpnet
      - dbnet
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - erpnet
      - dbnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - erpnet
      - dbnet
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # FILE STORAGE
  # =========================================================================
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER: ${MINIO_BROWSER}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - erpnet
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # EVENT BUS
  # =========================================================================
  nats:
    image: nats:2-alpine
    container_name: nats
    restart: unless-stopped
    command: "--user ${NATS_USER} --pass ${NATS_PASSWORD} -js"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    networks:
      - erpnet
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm="]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # ERPNEXT
  # =========================================================================
  erpnext-frontend:
    image: frappe/erpnext:${ERPNEXT_VERSION}
    container_name: erpnext-frontend
    restart: unless-stopped
    command: "nginx-entrypoint.sh"
    environment:
      BACKEND: erpnext-backend:8000
      SOCKETIO_PORT: 9000
      FRAPPE_SITE_NAME_HEADER: erp.localhost
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_assets:/home/frappe/frappe-bench/sites/assets
    networks:
      - erpnet
    depends_on:
      erpnext-backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erpnext.rule=Host(`${SITE_NAME}`)"
      - "traefik.http.services.erpnext.loadbalancer.server.port=8080"

  erpnext-backend:
    image: frappe/erpnext:${ERPNEXT_VERSION}
    container_name: erpnext-backend
    restart: unless-stopped
    command: "bench serve --port 8000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_CACHE: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_QUEUE: redis://:${REDIS_PASSWORD}@redis:6379/2
      REDIS_SOCKETIO: redis://:${REDIS_PASSWORD}@redis:6379/3
      SOCKETIO_PORT: 9000
      FRAPPE_SITE_NAME_HEADER: erp.localhost
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_assets:/home/frappe/frappe-bench/sites/assets
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - erpnet
      - dbnet
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: erp.localhost", "http://localhost:8000/api/method/ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  erpnext-worker-default:
    image: frappe/erpnext:${ERPNEXT_VERSION}
    container_name: erpnext-worker-default
    restart: unless-stopped
    command: "bench worker --queue default"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_CACHE: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_QUEUE: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - erpnet
      - dbnet
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-worker-short:
    image: frappe/erpnext:${ERPNEXT_VERSION}
    container_name: erpnext-worker-short
    restart: unless-stopped
    command: "bench worker --queue short"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_CACHE: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_QUEUE: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - erpnet
      - dbnet
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-scheduler:
    image: frappe/erpnext:${ERPNEXT_VERSION}
    container_name: erpnext-scheduler
    restart: unless-stopped
    command: "bench schedule"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_CACHE: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_QUEUE: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - erpnet
      - dbnet
    depends_on:
      erpnext-backend:
        condition: service_healthy

  erpnext-socketio:
    image: frappe/erpnext:${ERPNEXT_VERSION}
    container_name: erpnext-socketio
    restart: unless-stopped
    command: "node /home/frappe/frappe-bench/apps/frappe/socketio.js"
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
    networks:
      - erpnet
    depends_on:
      - erpnext-backend

  # =========================================================================
  # SECURITY API GATEWAY
  # =========================================================================
  security-api:
    build:
      context: ./services/security-api
      dockerfile: Dockerfile
    container_name: security-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NATS_URL: nats://${NATS_USER}:${NATS_PASSWORD}@nats:4222
      SECRET_KEY: ${SECURITY_API_SECRET_KEY}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      FSM_SERVICE_URL: http://fsm-service:8001
      CMDB_SERVICE_URL: http://cmdb-service:8002
      ERPNEXT_URL: http://erpnext-backend:8000
    ports:
      - "8000:8000"
    networks:
      - erpnet
      - dbnet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # =========================================================================
  # FSM SERVICE
  # =========================================================================
  fsm-service:
    build:
      context: ./services/fsm-service
      dockerfile: Dockerfile
    container_name: fsm-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${FSM_DB_USER}:${FSM_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NATS_URL: nats://${NATS_USER}:${NATS_PASSWORD}@nats:4222
      ERP_API_URL: http://erpnext-backend:8000
      SCHEMA_NAME: fsm
    ports:
      - "8001:8001"
    networks:
      - erpnet
      - dbnet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  # =========================================================================
  # CMDB SERVICE
  # =========================================================================
  cmdb-service:
    build:
      context: ./services/cmdb-service
      dockerfile: Dockerfile
    container_name: cmdb-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${CMDB_DB_USER}:${CMDB_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      NATS_URL: nats://${NATS_USER}:${NATS_PASSWORD}@nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SCHEMA_NAME: cmdb
    ports:
      - "8002:8002"
    networks:
      - erpnet
      - dbnet
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_started

  # =========================================================================
  # TELEGRAM SERVICE
  # =========================================================================
  telegram-service:
    build:
      context: ./services/telegram-service
      dockerfile: Dockerfile
    container_name: telegram-service
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SECURITY_API_URL: http://security-api:8000
      NATS_URL: nats://${NATS_USER}:${NATS_PASSWORD}@nats:4222
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - erpnet
    depends_on:
      - security-api
      - nats

  # =========================================================================
  # AUTOMATION (n8n)
  # =========================================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_DISABLED: "true"
      N8N_DISABLE_UI: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${INTEGRATION_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${INTEGRATION_DB_PASSWORD}
      GENERIC_TIMEZONE: ${TIMEZONE}
      N8N_USER_FOLDER: /home/node/.n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - erpnet
      - dbnet
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN}`)"
      - "traefik.http.routers.n8n.entrypoints=web"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.http.routers.n8n.middlewares=basic-auth@file"

  # =========================================================================
  # MONITORING
  # =========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - erpnet

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - erpnet
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./configs/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - erpnet

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./configs/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - erpnet
    depends_on:
      - loki

  # =========================================================================
  # CLOUDFLARE TUNNEL
  # =========================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./configs/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./configs/cloudflared/creds.json:/etc/cloudflared/creds.json:ro
    networks:
      - erpnet
