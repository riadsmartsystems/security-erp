# =============================================================================
# Security ERP — мінімальний Docker Compose (9 сервісів + cloudflared)
# =============================================================================

networks:
  erpnet:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
  erpnext_sites:
  erpnext_logs:

services:
  # =========================================================================
  # REVERSE PROXY
  # =========================================================================
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=security-erp_erpnet"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=WARN"
      - "--accesslog=false"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - erpnet
    labels:
      - "traefik.enable=true"

  # =========================================================================
  # DATABASE (MariaDB)
  # =========================================================================
  mariadb:
    image: mariadb:10.6
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE:-_erpnext}
      MYSQL_USER: ${MARIADB_USER:-erpnext}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./configs/mariadb.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - erpnet
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # REDIS
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - erpnet
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # ERPNEXT BACKEND (build з Dockerfile.backend)
  # =========================================================================
  erpnext-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: erpnext-backend
    restart: unless-stopped
    command:
      - "sh"
      - "-c"
      - "grep -qxF 'security_erp' /home/frappe/frappe-bench/sites/apps.txt || printf 'security_erp\\n' >> /home/frappe/frappe-bench/sites/apps.txt; pip install -e /home/frappe/frappe-bench/apps/security_erp && bench --site erp.localhost set-config -g redis_socketio redis://:${REDIS_PASSWORD}@redis:6379/3 && bench build --app security_erp && bench serve --port 8000"
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_CACHE: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_QUEUE: redis://:${REDIS_PASSWORD}@redis:6379/2
      REDIS_SOCKETIO: redis://:${REDIS_PASSWORD}@redis:6379/3
      SOCKETIO_PORT: "9000"
      FRAPPE_SITE_NAME_HEADER: erp.localhost
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
      - ./erpnext/security_erp:/home/frappe/frappe-bench/apps/security_erp
    networks:
      - erpnet
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: erp.localhost", "http://localhost:8000/api/method/ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # =========================================================================
  # ERPNEXT FRONTEND
  # =========================================================================
  erpnext-frontend:
    image: frappe/erpnext:v15.111.0
    container_name: erpnext-frontend
    restart: unless-stopped
    command: "nginx-entrypoint.sh"
    environment:
      BACKEND: erpnext-backend:8000
      SOCKETIO_PORT: "9000"
      FRAPPE_SITE_NAME_HEADER: erp.localhost
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
    networks:
      - erpnet
    depends_on:
      erpnext-backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erpnext.rule=Host(`${SITE_NAME}`) || Host(`erp.localhost`)"
      - "traefik.http.services.erpnext.loadbalancer.server.port=8080"

  # =========================================================================
  # WORKER (default)
  # =========================================================================
  erpnext-worker-default:
    image: frappe/erpnext:v15.111.0
    container_name: erpnext-worker-default
    restart: unless-stopped
    command: ["sh", "-c", "grep -qxF 'security_erp' /home/frappe/frappe-bench/sites/apps.txt || printf 'security_erp\\n' >> /home/frappe/frappe-bench/sites/apps.txt; bench worker --queue default"]
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_CACHE: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_QUEUE: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - erpnet
    depends_on:
      erpnext-backend:
        condition: service_healthy

  # =========================================================================
  # WORKER (short)
  # =========================================================================
  erpnext-worker-short:
    image: frappe/erpnext:v15.111.0
    container_name: erpnext-worker-short
    restart: unless-stopped
    command: ["sh", "-c", "grep -qxF 'security_erp' /home/frappe/frappe-bench/sites/apps.txt || printf 'security_erp\\n' >> /home/frappe/frappe-bench/sites/apps.txt; bench worker --queue short"]
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_CACHE: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_QUEUE: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - erpnet
    depends_on:
      erpnext-backend:
        condition: service_healthy

  # =========================================================================
  # SCHEDULER
  # =========================================================================
  erpnext-scheduler:
    image: frappe/erpnext:v15.111.0
    container_name: erpnext-scheduler
    restart: unless-stopped
    command: ["sh", "-c", "grep -qxF 'security_erp' /home/frappe/frappe-bench/sites/apps.txt || printf 'security_erp\\n' >> /home/frappe/frappe-bench/sites/apps.txt; bench schedule"]
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_CACHE: redis://:${REDIS_PASSWORD}@redis:6379/1
      REDIS_QUEUE: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - erpnet
    depends_on:
      erpnext-backend:
        condition: service_healthy

  # =========================================================================
  # SOCKETIO
  # =========================================================================
  erpnext-socketio:
    image: frappe/erpnext:v15.111.0
    container_name: erpnext-socketio
    restart: unless-stopped
    command: "node /home/frappe/frappe-bench/apps/frappe/socketio.js"
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
    networks:
      - erpnet
    depends_on:
      - erpnext-backend

  # =========================================================================
  # CLOUDFLARE TUNNEL
  # =========================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./configs/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./configs/cloudflared/creds.json:/etc/cloudflared/creds.json:ro
    networks:
      - erpnet
